[serial]
port = COM4
baudrate = 9600
timeout = 1.0
command = xmt
termination = \r
zero_frequency = 5970000.0
retries = 5
retry_delay = 0.1

[app]
gate_time_seconds = 5
window_title = QCM Monitor
window_width = 700
window_height = 1000
beep_threshold_minutes = 1.0
beep_duration_ms = 100
beep_warning_ms = 1000

[plot]
diff_window_points = 5
slope_window_points = 50
